# ---- GGGW Crosses 42 config ----

# OLED display: uncomment ONLY if your build has the little OLED screens.
# Leaving it off when there is no screen saves battery.
# CONFIG_ZMK_DISPLAY=y

# Stronger BLE signal — helps both halves talk to each other and to the host.
# Negligible battery cost. Recommended if you ever see dropped connections.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Sleep after 30 min idle to save battery (wakes on keypress).
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
